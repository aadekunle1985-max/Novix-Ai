<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novix AI</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h2>🤖 Novix AI</h2>

        <button id="newChat">
            + New Chat
        </button>

        <div class="history">

            <h3>Recent Chats</h3>

            <div class="chat-item">
                Welcome Chat
            </div>

        </div>

    </aside>

    <!-- Main Chat -->

    <main class="main">

        <header>

            <h1>Novix AI</h1>

            <p>Your intelligent AI assistant.</p>

        </header>

        <div id="chatBox" class="chat-box">

            <div class="bot-message">

                👋 Welcome to Novix AI!

                <br><br>

                Ask me anything.

            </div>

        </div>

        <footer>

            <input
            id="userInput"
            placeholder="Message Novix AI...">

            <button id="sendBtn">

                Send

            </button>

        </footer>

    </main>

</div>

<script src="script.js"></script>

</body>
</html>
